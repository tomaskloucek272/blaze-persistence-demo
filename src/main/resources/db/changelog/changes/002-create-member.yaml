databaseChangeLog:
  - changeSet:
      id: 002-create-member
      author: tomas.kloucek
      changes:
        - createTable:
            tableName: member
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: surname
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
              - column:
                  name: email
                  type: VARCHAR(255)
              - column:
                  name: teamId
                  type: BIGINT
                  constraints:
                    foreignKeyName: fk_member_team
                    references: team(id)
