databaseChangeLog:
  - changeSet:
      id: 001-create-team
      author: tomas.kloucek
      changes:
        - createTable:
            tableName: team
            columns:
              - column:
                  name: id
                  type: BIGINT
                  autoIncrement: true
                  constraints:
                    primaryKey: true
                    nullable: false
              - column:
                  name: name
                  type: VARCHAR(255)
                  constraints:
                    nullable: false
